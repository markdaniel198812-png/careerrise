<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerRise | Employment Verification</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">

    <div class="logo">
        CareerRise
    </div>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>Your Next Career Starts Here</h1>

        <p>
            Complete the required verification to continue
            your employment application.
        </p>

        <a href="#" class="apply-btn" id="applyBtn">
    Apply Now
</a>

<p style="margin-top:15px;color:#64748b;font-size:15px;">
    By clicking "Apply Now", you will continue to the next step of the application process.
</p>

    </div>

</section>

<section class="upload-section">

    <h2>Complete Your Application</h2>

    <p>Please fill in the information below.</p>

    <form>

        <input type="text" placeholder="Full Name" required>

        <br><br>

        <input type="email" placeholder="Email Address" required>

        <br><br>

        <input type="tel" placeholder="Phone Number" required>

        <br><br>

        <input type="file" required>

        <br><br>

        <button class="apply-btn" type="submit">
            Submit Application
        </button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
